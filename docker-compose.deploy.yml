# Production deployment using pre-built images from GHCR
# No build required - just set your .env and run: docker compose -f docker-compose.deploy.yml up -d

services:
  api:
    image: ghcr.io/irpina/motherbrain-mcp/api:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/motherbrain
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=motherbrain
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  dashboard:
    image: ghcr.io/irpina/motherbrain-mcp/dashboard:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - API_KEY=${API_KEY:-supersecret}
      - API_INTERNAL_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
